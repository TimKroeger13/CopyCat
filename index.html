<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Draw Together</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <link rel="stylesheet" href="Frontend/canvas.css">
    
</head>
<body>

    <div id="roleScreen">
        <h1>Draw together ✏️</h1>
        <button class="roleBtn player1" onclick="selectRole('player1')">✏️ Player 1</button>
        <button class="roleBtn player2" onclick="selectRole('player2')">✏️ Player 2</button>
        <button class="roleBtn guesser" onclick="selectRole('guesser')">🔍 Guesser</button>
    </div>

    <div id="wordScreen" style="display:none">
        <h2>Wähle dein Wort</h2>
        <div id="wordOptions"></div>
    </div>

    <div id="topBar">
        <span id="roleLabel">-</span>
        <div id="inkWrapper" style="display:none">
            <span id="inkLabel">Ink: 300 / 300</span>
            <div id="inkBarBg"><div id="inkBar"></div></div>
        </div>
        <button onclick="changeRole()">Rolle wechseln</button>
    </div>

    <div id="canvasWrapper">
        <canvas id="canvas"></canvas>
        <canvas id="cursorCanvas"></canvas>  <!-- Cursor Overlay -->
    </div>


    <div id="controls" style="position:relative">
        <button id="btnPen"       class="active" onclick="setTool('pen')">✏️</button>
        <button id="btnEraser"                   onclick="setTool('eraser')">🧽</button>
        <button id="btnClearMine"                onclick="clearMine()">🗑️</button>
        <button id="btnNewGame"                  onclick="voteNewGame()">🆕</button>
        <div id="newGameHint"></div>
    </div>
    <script src="Frontend/canvas.js"></script>
</body>
</html>
